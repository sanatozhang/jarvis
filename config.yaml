# ===========================
# Appllo Global Configuration
# ===========================

# Feishu Bitable 配置
feishu:
  app_token: "BmjmbSpxxabP2dsuxbtcUTYAn4g"
  table_id: "tblWQRIvZq74MhRT"
  view_id: "vewu36X0Gx"
  base_url: "https://nicebuild.feishu.cn/base/BmjmbSpxxabP2dsuxbtcUTYAn4g"

# Linear 配置
linear:
  trigger_keyword: "@ai-agent"  # 在 comment 中包含此关键词触发分析
  # api_key 和 webhook_secret 请通过 .env 配置

# Agent 配置
agent:
  default: claude_code
  timeout: 600           # 单次分析超时（秒）— 探索式分析需要足够时间
  max_turns: 50          # Agent 最大交互轮数 — 留足余量避免 max turns 错误

  providers:
    claude_code:
      enabled: true
      model: "claude-sonnet-4-6[1m]"    # Sonnet 4.6 with 1M context window
      effort: "high"                    # low / medium / high / max — 思考深度
      fallback_model: "claude-sonnet-4-6"  # 主模型过载时自动降级（200K context）
      allowed_tools:
        - "Read"
        - "Write"
        - "Grep"
        - "Glob"
        - "Shell(grep:*)"
        - "Shell(wc:*)"
        - "Shell(head:*)"
        - "Shell(tail:*)"
        - "Shell(sort:*)"
        - "Shell(awk:*)"
        - "Shell(date:*)"
        - "Shell(sed:*)"
        - "Shell(cat:*)"
        - "Shell(zcat:*)"
        - "Shell(gunzip:*)"

    codex:
      enabled: true
      model: ""             # empty = use default (gpt-5.3-codex)
      approval_mode: "full-auto"

  # 按问题类型路由到不同 Agent
  routing:
    flutter_crash: claude_code
    recording_missing: claude_code
    bluetooth: claude_code
    cloud_sync: claude_code
    speaker: claude_code
    timestamp_drift: claude_code
    general: claude_code

# L1.5 上下文浓缩 — 用大 context 便宜模型预提取日志关键信息
# 开启后，大日志文件会先经过时间窗口切割 + LLM 提取，再交给分析 Agent
# API key 通过 .env 配置: CONDENSER_API_KEY=your-key-here
context_condensation:
  enabled: true                     # L1.5 预提取默认开启
  provider: anthropic               # 使用 Anthropic (和分析 Agent 共用同一个 key)
  model: "claude-haiku-4-5"         # Haiku 便宜快速，适合预提取
  log_size_threshold_mb: 5          # 仅对 > 5MB 的日志启用 L1.5
  time_window_hours_before: 4       # 问题日期前 N 小时
  time_window_hours_after: 2        # 问题日期后 N 小时
  timeout: 120                      # LLM 调用超时（秒）

# 并发配置
concurrency:
  max_workers: 3           # 最大并行 Worker 数
  max_agent_sessions: 3    # 最大同时 Agent 会话
  max_downloads: 5         # 最大并行下载数
  task_timeout: 600        # 任务整体超时（秒）

# 文件存储
storage:
  workspace_dir: "./workspaces"    # 分析工作空间
  data_dir: "./data"               # 数据库等持久化数据

# 源码仓库路径（通过 .env 配置，这里仅做说明）
# CODE_REPO_APP=/path/to/plaud_ai          # APP (Flutter) 源码
# CODE_REPO_WEB=/path/to/plaud_web         # Web 前端源码
# CODE_REPO_DESKTOP=/path/to/plaud_desktop # Desktop (Electron) 源码
# CODE_REPO_PATH=/path/to/plaud_ai         # 旧字段，兼容，等同于 CODE_REPO_APP

# ===========================
# Crashguard 模块配置
# ===========================
crashguard:
  enabled: true                # kill switch
  pr_enabled: true             # PR 创建总开关
  feishu_enabled: true         # 群消息开关
  max_top_n: 20

  datadog:
    site: "datadoghq.com"      # 或 "datadoghq.eu"
    # api_key / app_key 请通过 .env 配置:
    #   CRASHGUARD_DATADOG_API_KEY=xxx
    #   CRASHGUARD_DATADOG_APP_KEY=xxx

  feishu:
    target_chat_id: "oc_7b7ed77c489e7459a6f7d9a299eef51a"  # 生产群聊
    target_email: ""                                        # 测试通道关闭（如需点对点 fallback 再开）
    admin_open_ids: []                                      # 一键 PR approve 白名单
    morning_cron: "0 7 * * *"
    evening_cron: "0 17 * * *"

  thresholds:
    surge_multiplier: 1.5              # 飙升判定阈值（倍数）
    surge_min_events: 10               # 飙升最小事件数
    regression_silent_versions: 3      # 回归判定的静默版本数
    feasibility_pr_threshold: 0.7      # 自动创建 PR 的 feasibility 触发线（>= 此值才触发自动 draft PR）
    # 早晚报关注点阈值（vs 昨日变化率 + events 量级下限）
    daily_surge_threshold: 0.10        # +10% 进突增
    daily_drop_threshold: -0.10        # -10% 进下降
    daily_attention_min_events: 100    # events 量级下限，新增 issue 不受此限

  # 半自动 PR 仓库映射 —— 给自动 PR 用（必填，否则 audit log 报 repo_path 不存在）
  # 留空 = 该平台禁用 auto PR；填绝对路径 = 启用
  # 也可通过 .env 设置（CRASHGUARD_REPO_PATH_FLUTTER 等），env 优先级更高
  repo_paths:
    flutter: ""                        # 例: "/Users/sanato/Desktop/code/plaud-flutter"
    android: ""
    ios: ""

  pr_dedup_days: 30                    # 同一 issue+platform N 天内只允许一个 draft PR
  frontend_base_url: "http://localhost:3000"  # 飞书消息链接前缀
