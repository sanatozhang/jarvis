key: crash_free_sessions
name: '[coreguard][P0] Crash-free sessions 周同比下跌 (change/SHoW)'
type: rum alert
detection: change
query: formula("(100 - ((query1 * 100) / query2)) - week_before(100 - ((query1 * 100)
  / query2))").last("15m") < -0.5
priority: 1
tags:
- source:coreguard
- tier:p0
- metric:crash_free_sessions
notify:
- '@sanato.zhang@plaud.ai'
message: Crash-free sessions 较上周同时刻下跌超过 0.5pp。
muted_on_create: true
options:
  variables:
  - data_source: rum
    name: query1
    search:
      query: '@type:error @error.is_crash:true -@error.category:ANR env:production
        @application.name:plaud-flutter @device.type:Mobile'
    indexes:
    - '*'
    compute:
      aggregation: cardinality
      metric: '@session.id'
    group_by: []
  - data_source: rum
    name: query2
    search:
      query: '@session.type:user env:production @application.name:plaud-flutter @device.type:Mobile
        @type:session'
    indexes:
    - '*'
    compute:
      aggregation: count
    group_by: []
id: 291314586
