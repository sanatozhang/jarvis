services:
  # ---- Reverse Proxy (TLS termination) ----
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - BACKEND_UPSTREAM=backend:8000
      - FRONTEND_UPSTREAM=frontend:3000
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ---- Backend API ----
  backend:
    build: ./backend
    # Port exposed only within Docker network; Caddy handles external access
    expose:
      - "8000"
    volumes:
      # 注意：config.yaml 挂载到 /config.yaml（根目录），因为容器内 PROJECT_ROOT=/
      # backend/app/config.py: Path(__file__).parent.parent.parent 在容器内解析为 /，而非 /app
      - ./config.yaml:/config.yaml:ro
      # 同理，data 和 workspaces 也挂载到根目录下
      - ./data:/data                         # 数据库实际路径为 /data/appllo.db
      - ./workspaces:/workspaces             # 工作区实际路径为 /workspaces/
      - ./backend/rules:/app/rules:ro        # 规则文件热更新，无需重建镜像
      # - ./codex-auth.json:/root/.codex/auth.json:ro  # Codex OAuth auth (optional)
      # claude 凭证用 named volume 持久化；首次部署执行：
      # docker compose exec -it backend claude login
      - claude-auth:/root/.claude
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/appllo.db
    depends_on:
      - redis
    restart: unless-stopped

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      args:
        - STANDALONE=1
        - NEXT_PUBLIC_API_URL=http://backend:8000
    # Port exposed only within Docker network; Caddy handles external access
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  claude-auth:
  caddy_data:
  caddy_config:
