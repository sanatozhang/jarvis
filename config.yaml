# ===========================
# Appllo Global Configuration
# ===========================

# Feishu Bitable 配置
feishu:
  app_token: "BmjmbSpxxabP2dsuxbtcUTYAn4g"
  table_id: "tblWQRIvZq74MhRT"
  view_id: "vewu36X0Gx"
  base_url: "https://nicebuild.feishu.cn/base/BmjmbSpxxabP2dsuxbtcUTYAn4g"

# Linear 配置
linear:
  trigger_keyword: "@ai-agent"  # 在 comment 中包含此关键词触发分析
  # api_key 和 webhook_secret 请通过 .env 配置

# Agent 配置
agent:
  default: claude_code
  call_mode: cli         # "cli" | "api" — Settings 页面切换；api 把 claude_code 自动替换成 claude_api
  timeout: 600           # 单次分析超时（秒）— 探索式分析需要足够时间
  max_turns: 30          # Agent 最大交互轮数 — 50 太宽松会触发 grep 风暴；30 配合 prompt anti-timeout 协议

  providers:
    claude_api:
      enabled: true
      model: "claude-sonnet-4-6"        # Vertex 代理不识别 [1m] 后缀
      fallback_model: "claude-haiku-4-5"
      base_url: "http://34.216.169.232:30001/vertex"   # 公司 Vertex 代理（VPN 内）
      per_turn_timeout: 120             # 单轮 messages.create 超时（秒）
      max_tokens: 8192                  # 单轮最大输出 token
      enable_cache: true                # cache_control 头；目前 proxy 不生效（见 spike 2026-05-13），保留 forward-compat
      timeout: 600

    claude_code:
      enabled: true
      model: "claude-sonnet-4-6[1m]"    # Sonnet 4.6 with 1M context window
      effort: "high"                    # low / medium / high / max — 思考深度
      fallback_model: "claude-sonnet-4-6"  # 主模型过载时自动降级（200K context）
      allowed_tools:
        - "Read"
        - "Write"
        - "Grep"
        - "Glob"
        - "Shell(grep:*)"
        - "Shell(wc:*)"
        - "Shell(head:*)"
        - "Shell(tail:*)"
        - "Shell(sort:*)"
        - "Shell(awk:*)"
        - "Shell(date:*)"
        - "Shell(sed:*)"
        - "Shell(cat:*)"
        - "Shell(zcat:*)"
        - "Shell(gunzip:*)"

    codex:
      enabled: true
      model: ""             # empty = use default (gpt-5.3-codex)
      approval_mode: "full-auto"

  # 按问题类型路由到不同 Agent
  routing:
    flutter_crash: claude_code
    recording_missing: claude_code
    bluetooth: claude_code
    cloud_sync: claude_code
    speaker: claude_code
    timestamp_drift: claude_code
    general: claude_code

# L1.5 上下文浓缩 — 用大 context 便宜模型预提取日志关键信息
# 开启后，大日志文件会先经过时间窗口切割 + LLM 提取，再交给分析 Agent
# API key 通过 .env 配置: CONDENSER_API_KEY=your-key-here
context_condensation:
  enabled: true                     # L1.5 预提取默认开启
  provider: anthropic               # 使用 Anthropic (和分析 Agent 共用同一个 key)
  model: "claude-haiku-4-5"         # Haiku 便宜快速，适合预提取
  log_size_threshold_mb: 5          # 仅对 > 5MB 的日志启用 L1.5
  time_window_hours_before: 4       # 问题日期前 N 小时
  time_window_hours_after: 2        # 问题日期后 N 小时
  timeout: 120                      # LLM 调用超时（秒）

# 并发配置
concurrency:
  max_workers: 3           # 最大并行 Worker 数
  max_agent_sessions: 3    # 最大同时 Agent 会话
  max_downloads: 5         # 最大并行下载数
  task_timeout: 600        # 任务整体超时（秒）

# 文件存储
storage:
  workspace_dir: "./workspaces"    # 分析工作空间
  data_dir: "./data"               # 数据库等持久化数据

# 源码仓库路径（通过 .env 配置，这里仅做说明）
# CODE_REPO_APP=/path/to/plaud_ai          # APP (Flutter) 源码
# CODE_REPO_WEB=/path/to/plaud_web         # Web 前端源码
# CODE_REPO_DESKTOP=/path/to/plaud_desktop # Desktop (Electron) 源码
# CODE_REPO_PATH=/path/to/plaud_ai         # 旧字段，兼容，等同于 CODE_REPO_APP

# ===========================
# Crashguard 模块配置
# ===========================
crashguard:
  enabled: true                # kill switch
  pr_enabled: true             # PR 创建总开关
  feishu_enabled: true         # 群消息开关
  max_top_n: 20

  datadog:
    site: "datadoghq.com"      # 或 "datadoghq.eu"
    # api_key / app_key 请通过 .env 配置:
    #   CRASHGUARD_DATADOG_API_KEY=xxx
    #   CRASHGUARD_DATADOG_APP_KEY=xxx

  feishu:
    target_chat_id: "oc_7b7ed77c489e7459a6f7d9a299eef51a"  # 生产群聊（早晚报进群）
    target_email: ""                                        # 老路径（target chat 兜底用）
    # 非早晚报告警（hourly_alert / core_metric / job_health）专属投递目标。
    # 设置后这类告警走点对点 email，不打扰群里其他人；早晚报继续进群。
    # 通常通过 env CRASHGUARD_FEISHU_ALERT_EMAIL 配置（避免把个人邮箱写进代码库）。
    alert_email: ""
    admin_open_ids: []                                      # 一键 PR approve 白名单
    morning_cron: "0 7 * * *"
    evening_cron: "0 17 * * *"
    # 早晚报差异化窗口（A+B 方案）：
    #   morning_cron 07:00 → 昨日 24h 总览（用 datadog.window_hours，默认 24）
    #   evening_cron 17:00 → 日内增量（用 evening_window_hours，默认 10h = 07~17）
    # 基线均为 SHoW（上周同 weekday 同窗口段），晚报需依赖 Datadog 实时拉数据
    # （CrashSnapshot 日级颗粒度不支持 10h 段；实时失败则退化为无基线，宁缺勿误报）
    evening_window_hours: 10

  # AI 分析定时小步分批：避免一次串行 20 个 issue 被 OS/网络杀掉
  # 默认每 5 分钟 1 个 → 20 个约 100 分钟跑完；中途崩了只丢当前 1 个，下 tick 自动续跑
  analyze_cron: "*/5 * * * *"
  analyze_max_per_tick: 1
  # 自动去重窗口：同 issue N 小时内已有 success 分析则复用，省 token
  analysis_dedup_hours: 6

  # Hourly 实时告警（SHoW = Same Hour-of-Week 同周同时对比）
  # 底层逻辑：Plaud 用户 JP/US/EU 分布，hourly 流量有日内+周内双重周期。
  # 用上周同 weekday 同小时做基线，10% 增长才是真信号（避开时区轮替造成的自然涨幅）。
  # 早晚报和此告警都**不含**修复 PR 内容；PR 状态查看走前端 /crashguard。
  hourly_alert:
    enabled: true
    cron: "5 */3 * * *"            # 每 3 小时第 5 分钟（SHoW-3h；ingest 延迟 3-5 分钟）
    growth_threshold_pct: 10       # 超过基线 10% 触发上涨告警
    new_window_days: 30            # 近 30 天首次出现 = 新增告警
    min_baseline_events: 20        # 上周同 3h 块 < 20 件则跳过百分比判定（小基数噪声）
    max_items: 10                  # 卡片最多展示前 N 项
    min_sessions: 60               # 受影响会话 < 60 不告警（脏数据过滤；Plaud RUM 无 user 字段，sessions 代理 user）

  # 核心指标报警（crash-free sessions % 健康度，10 分钟粒度）
  # 底层逻辑：早晚报是 24h 大盘，hourly_alert 是单 issue 突增；本告警补"系统级健康度"颗粒度。
  # 用 Datadog Mobile RUM 原生 crash-free sessions % 口径；对比基线 = 前 1h 加权均值。
  # 卡片不含 PR 修复内容；点击 web view 跳 /crashguard/reports?type=core_metric_alert
  core_metric:
    enabled: true
    cron: "*/10 * * * *"           # 每 10 分钟一次
    change_threshold_pp: 0.3       # crash-free % 变化绝对值 >= N pp 触发（pp=百分点）
    min_sessions: 100              # 当前 10min 窗口 sessions < N 不告警（小流量噪声）
    platforms:                     # 监控平台白名单
      - android
      - ios

  thresholds:
    surge_multiplier: 1.5              # 飙升判定阈值（倍数）
    surge_min_events: 10               # 飙升最小事件数
    regression_silent_versions: 3      # 回归判定的静默版本数
    feasibility_pr_threshold: 0.7      # 自动创建 PR 的 feasibility 触发线（>= 此值才触发自动 draft PR）
    # 早晚报关注点阈值（vs 昨日变化率 + events 量级下限）
    daily_surge_threshold: 0.10        # +10% 进突增
    daily_drop_threshold: -0.10        # -10% 进下降
    daily_attention_min_events: 100    # events 量级下限，新增 issue 不受此限

  # 半自动 PR 仓库映射 —— 给自动 PR 用（必填，否则 audit log 报 repo_path 不存在）
  # 留空 = 该平台禁用 auto PR；填绝对路径 = 启用
  # 也可通过 .env 设置（CRASHGUARD_REPO_PATH_FLUTTER 等），env 优先级更高
  repo_paths:
    flutter: ""                        # 例: "/Users/sanato/Desktop/code/plaud-flutter"
    android: ""
    ios: ""

  pr_dedup_days: 30                    # 同一 issue+platform N 天内只允许一个 draft PR
  # frontend_base_url 已留空 → 启动时自动探测本机出口 IP（多机部署友好）
  # Docker 部署请显式设 env：CRASHGUARD_FRONTEND_BASE_URL=http://10.0.52.x:3000
  # 或 HOST_IP=10.0.52.x（自动补 :3000）
  # frontend_base_url: ""
