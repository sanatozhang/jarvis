services:
  # ---- Backend API ----
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 注意：config.yaml 挂载到 /config.yaml（根目录），因为容器内 PROJECT_ROOT=/
      # backend/app/config.py: Path(__file__).parent.parent.parent 在容器内解析为 /，而非 /app
      - ./config.yaml:/config.yaml:ro
      # config.local.yaml：每台服务器独立的运行时覆盖（/settings 页面的开关写这里），
      # 不进 git，必须可写——config.yaml 保持 :ro 是因为它是 git 追踪文件，容器写入
      # 会静默失败且弄脏工作区（2026-07-21 生产环境实测踩过，qa_capture_enabled 切换
      # "看起来生效"实际从未落盘）。宿主机文件不存在时 deploy.sh 会自动 touch 一份。
      - ./config.local.yaml:/config.local.yaml
      # .env 同理挂到根目录（/.env），且必须可写（不是 :ro）——`/api/env` 设置页
      # 读写的是这个实际文件路径，而不只是下面 env_file: 注入的进程环境变量。之前
      # 没挂载这个文件时，容器内 PROJECT_ROOT/.env 压根不存在：GET 页面读到的全是
      # 空值，PATCH 写入会在容器自己的临时文件系统里创建一个宿主机完全看不到的
      # "幽灵文件"，重启即彻底丢失（2026-07-21 生产环境实测发现，比 config.yaml
      # 只读挂载那个 bug 更隐蔽——那个至少异常可查，这个连报错都没有）。.env 本身
      # 不进 git（见 .gitignore），挂可写不会有 git 工作区冲突的顾虑。
      - ./.env:/.env
      # 同理，data 和 workspaces 也挂载到根目录下
      - ./data:/data                         # 数据库实际路径为 /data/appllo.db
      - ./workspaces:/workspaces             # 工作区实际路径为 /workspaces/
      - ./backend/rules:/app/rules:ro        # 规则文件热更新，无需重建镜像
      # - ./codex-auth.json:/root/.codex/auth.json:ro  # Codex OAuth auth (optional)
      # claude 凭证用 named volume 持久化；首次部署执行：
      # docker compose exec -it backend claude login
      # 顶层设计：volume 只能挂目录，但 Claude CLI 把 session config 写在 sibling
      # ~/.claude.json（不在 ~/.claude/ 内）。Dockerfile 把 /root/.claude.json
      # symlink 到 /root/.claude/_root_config.json——这样单 volume 就覆盖了
      # 凭证目录 + session 文件，rebuild 后两者都保留。
      - claude-auth:/root/.claude
      - lark-cli-auth:/root/.lark-cli        # 飞书 CLI 凭证持久化
      # GitHub CLI 凭证持久化（crashguard auto-PR 必需）；首次部署执行：
      # docker compose exec -it backend gh auth login
      # 不持久化会导致每次 `docker compose up` 都要重新登录
      - gh-auth:/root/.config/gh
      # ---- Crashguard 源码仓库（auto-PR 必需）----
      # 底层逻辑：透传宿主路径以**同名路径**挂进容器，pr_drafter 读到的 s.repo_path_* 直接可访问。
      # 兼容两套 env 约定：
      #   - 新：CRASHGUARD_REPO_PATH_{FLUTTER,ANDROID,IOS}
      #   - 老（主 jarvis）：CODE_REPO_APP（Flutter，主仓库）/ CODE_REPO_ANDROID / CODE_REPO_IOS / CODE_REPO_PATH（legacy）
      # 任一变量设值即挂载；多个同时设也无害（同名 bind mount 幂等）。未设变量回落 /dev/null。
      - "${CRASHGUARD_REPO_PATH_FLUTTER:-/dev/null}:${CRASHGUARD_REPO_PATH_FLUTTER:-/tmp/.no_cg_flutter}"
      - "${CRASHGUARD_REPO_PATH_ANDROID:-/dev/null}:${CRASHGUARD_REPO_PATH_ANDROID:-/tmp/.no_cg_android}"
      - "${CRASHGUARD_REPO_PATH_IOS:-/dev/null}:${CRASHGUARD_REPO_PATH_IOS:-/tmp/.no_cg_ios}"
      - "${CODE_REPO_APP:-/dev/null}:${CODE_REPO_APP:-/tmp/.no_code_app}"
      - "${CODE_REPO_ANDROID:-/dev/null}:${CODE_REPO_ANDROID:-/tmp/.no_code_android}"
      - "${CODE_REPO_IOS:-/dev/null}:${CODE_REPO_IOS:-/tmp/.no_code_ios}"
      - "${CODE_REPO_PATH:-/dev/null}:${CODE_REPO_PATH:-/tmp/.no_code_path}"
      # git push 需要 ssh key —— 透传宿主的 .ssh（只读防误改）
      - "${HOME}/.ssh:/root/.ssh:ro"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/appllo.db
      # crashguard 早晚报 cron 用 datetime.now() 本地时间。容器默认 UTC 会导致
      # "0 7 * * *" 在北京 15:00 才触发——必须显式设北京时区。
      - TZ=Asia/Shanghai
      # Crashguard 仓库路径直接从 env_file (.env) 读取 CRASHGUARD_REPO_PATH_*，
      # 上面的 volume bind mount 透传同名宿主路径，无需在此重复声明。
      # coreguard 报警暂停（2026-06-09）：hourly_watch 仍跑、仍写快照（喂 crashguard
      # 早报里的 coreguard 板块），但不发飞书实时告警。恢复报警把这行删掉/改 true 即可。
      - COREGUARD_ALERT_ENABLED=false
    depends_on:
      - redis
    restart: unless-stopped

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      args:
        - STANDALONE=1
        - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  claude-auth:
  lark-cli-auth:
  gh-auth:
