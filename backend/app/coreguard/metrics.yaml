# coreguard metrics whitelist — 自动从 Datadog dashboard 4h8-qff-zra 生成
# Generated 2026-05-25; review tier/threshold per-metric override before relying on it.

defaults:
  pp_threshold: 1.0          # 百分比指标默认绝对百分点阈值
  pct_threshold: 0.20        # 计数/延迟指标默认相对百分比
  min_baseline_sessions: 200
  consecutive_breach: 2      # 连续 N 个小时窗口超阈才告警
  direction: worse_only      # 仅恶化方向触发
  dedup_window_hours: 6

dashboard:
  id: "4h8-qff-zra"
  expected_widget_count: 55

metrics:
  - key: crash_free_sessions
    title: "Crash-free sessions"
    widget_id: 0
    widget_type: query_value
    tier: P0
    value_type: percent_pp
    direction: down_is_bad
    threshold: { pp: 0.5 }   # v3 2026-05-26: 1.0pp → 0.5pp（实测 60d worst drop -0.66pp 抓得到）
    alert_enabled: true

  - key: crash_free_users
    title: "Crash-free users"
    widget_id: 1
    widget_type: query_value
    tier: P0
    value_type: percent_pp
    direction: down_is_bad
    threshold: { pp: 0.3 }   # v3 2026-05-26: 1.0pp → 0.3pp（实测 60d worst drop -0.37pp）
    alert_enabled: true

  - key: android_anr
    title: "Android ANR"
    widget_id: 2
    widget_type: query_value
    tier: P0
    value_type: percent_pp          # v4 2026-05-26 修正：dashboard red 0.47% 是 Google Play 合规线
    direction: up_is_bad            # 不是小时级告警线 → 回退 SHoW + 放宽阈值
    threshold: { pp: 2.0 }          # v5 2026-05-28: 3.0pp → 2.0pp（30d 实测 max=1.99pp，3pp 过宽）
    alert_enabled: true

  - key: hang_rate
    title: "Hang Rate"
    widget_id: 3
    widget_type: query_value
    tier: P0
    value_type: absolute_threshold   # v4 2026-05-26: SHoW → 绝对阈值（ns/h 单位，SHoW 抖动太大）
    direction: up_is_bad
    threshold: { red: 1200000000 }   # dashboard red line: 12 亿 ns/h
    alert_enabled: true

  - key: memory_usage
    title: "Memory Usage"
    widget_id: 4
    widget_type: query_value
    tier: P1
    value_type: count_pct
    direction: up_is_bad
    threshold: { pct: 0.10 }   # v5 2026-05-28: 0.25 → 0.10（30d 实测 avg|chg|=2.7%，25% 过宽到几乎不动）
    alert_enabled: true

  - key: refresh_rate
    title: "Refresh Rate"
    widget_id: 5
    widget_type: query_value
    tier: P1
    value_type: percent_pp
    direction: down_is_bad
    threshold: { pp: 1.0 }
    alert_enabled: true

  - key: app_avg_fps
    title: "APP单次运行平均FPS"
    widget_id: 6
    widget_type: query_value
    tier: P1
    value_type: count_pct
    direction: down_is_bad
    threshold: { pct: 0.25 }
    alert_enabled: true

  - key: cold_startup_p90
    title: "Cold Startup p90"
    widget_id: 7
    widget_type: query_value
    tier: P1
    value_type: latency_pct
    direction: up_is_bad
    # v5 2026-05-28: hourly 阈值字段已删 — 设备分布漂移 + P90 尾部敏感，
    # hourly SHoW 自然抖动 avg|chg|=17.4%，根本不可用。改走早报 day-level。
    # 30d Datadog 实测：daily SHoW avg|chg|=14.2%, max=27.1%, P90=31.6%；
    # pct=0.10 在 30d 内 1 次告警（5/27 的 +27% 异常），alert rate 4% 合理。
    daily_threshold: { pct: 0.10 }
    alert_enabled: false   # 不参与 hourly；daily 检查走 daily_section.py

  - key: ios_jank_count_p90
    title: "APP单次使用的卡顿次数iOS（p90）"
    widget_id: 8
    widget_type: query_value
    tier: P2
    value_type: latency_pct
    direction: up_is_bad
    threshold: { pct: 0.25 }
    alert_enabled: false

